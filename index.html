<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bruno Lenses — Fotografia & Filmagem</title>
    <meta name="description" content="Bruno Lenses — Fotografia e filmagem autoral. Casamentos, ensaios, dança, editorial e mais.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

    <style>
        *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

        :root {
            --font-display: 'Cormorant Garamond', serif;
            --font-body: 'DM Sans', sans-serif;
            --color-bg: #0a0a0a;
            --color-text: #ffffff;
            --color-text-muted: rgba(255,255,255,0.7);
            --color-text-light: rgba(255,255,255,0.5);
            --color-accent: #d4af37;
        }

        html { scroll-behavior: smooth; }
        body { background:var(--color-bg); color:var(--color-text); font-family:var(--font-body); }

        /* ---- SCROLLABLE CONTAINER ---- */
        .scroll-container { height: 400vh; position:relative; }

        /* ---- STICKY VIEWPORT ---- */
        .sticky-viewport {
            position:sticky; top:0;
            width:100%; height:100vh;
            overflow:hidden;
        }

        /* ---- WEBGL BACKGROUND ---- */
        .webgl-canvas {
            position:absolute; inset:0; width:100%; height:100%;
            display:block; z-index:1;
        }

        /* Vignette overlay */
        .bg-overlay {
            position:absolute; inset:0; z-index:2;
            background:
                radial-gradient(ellipse at center, transparent 20%, rgba(0,0,0,0.7) 100%),
                linear-gradient(to bottom, rgba(0,0,0,0.3) 0%, transparent 30%, transparent 70%, rgba(0,0,0,0.4) 100%);
            pointer-events:none;
        }

        /* ---- BRANDING ---- */
        .brand-top {
            position:absolute; top:36px; left:50%; transform:translateX(-50%);
            z-index:10; text-align:center;
        }
        .brand-name {
            font-family:var(--font-display); font-size:clamp(22px, 2.8vw, 32px);
            font-weight:300; letter-spacing:0.3em; text-transform:uppercase;
            color:var(--color-text); opacity:0.95;
        }
        .brand-tagline {
            font-size:11px; letter-spacing:0.4em; text-transform:uppercase;
            color:var(--color-text-light); margin-top:6px;
        }

        /* ---- SCROLL HINT ---- */
        .scroll-hint {
            position:absolute; bottom:30px; left:50%; transform:translateX(-50%);
            z-index:10; text-align:center;
            animation: hintPulse 2s ease-in-out infinite;
        }
        .scroll-hint-text {
            font-size:11px; letter-spacing:0.2em; text-transform:uppercase;
            color:var(--color-text-light); margin-bottom:8px;
        }
        .scroll-hint-arrow {
            width:20px; height:20px; margin:0 auto;
            border-right:1.5px solid var(--color-text-light);
            border-bottom:1.5px solid var(--color-text-light);
            transform:rotate(45deg);
        }
        @keyframes hintPulse {
            0%, 100% { opacity:0.6; transform:translateX(-50%) translateY(0); }
            50% { opacity:1; transform:translateX(-50%) translateY(6px); }
        }

        /* ---- 3D GALLERY ---- */
        .gallery-scene {
            position:absolute; inset:0; z-index:5;
            display:flex; align-items:center; justify-content:center;
            perspective:1800px;
            pointer-events:none;
        }
        .gallery-ring {
            position:relative;
            width:300px; height:400px;
            transform-style:preserve-3d;
            transition:transform 0.1s linear;
        }

        /* ---- CARD ---- */
        .gallery-card {
            position:absolute;
            width:280px; height:380px;
            left:50%; top:50%;
            margin-left:-140px; margin-top:-190px;
            border-radius:16px;
            overflow:hidden;
            cursor:pointer;
            pointer-events:auto;
            transition:opacity 0.3s linear, transform 0.3s ease;
            backface-visibility:hidden;
            box-shadow:0 20px 60px rgba(0,0,0,0.5);
        }
        .gallery-card:hover { transform:scale(1.04); }

        .card-image {
            position:absolute; inset:0;
            width:100%; height:100%;
            object-fit:cover;
        }

        .card-glass {
            position:absolute; inset:0;
            background:linear-gradient(
                to top,
                rgba(0,0,0,0.85) 0%,
                rgba(0,0,0,0.4) 35%,
                rgba(0,0,0,0.05) 70%,
                transparent 100%
            );
        }

        .card-content {
            position:absolute; bottom:0; left:0; right:0;
            padding:24px;
            z-index:2;
        }
        .card-label {
            font-size:10px; letter-spacing:0.3em; text-transform:uppercase;
            color:var(--color-accent); margin-bottom:6px; font-weight:500;
        }
        .card-title {
            font-family:var(--font-display); font-size:28px;
            font-weight:400; line-height:1.2;
            color:var(--color-text); margin-bottom:6px;
        }
        .card-desc {
            font-size:12px; color:var(--color-text-muted);
            line-height:1.5; opacity:0.8;
        }
        .card-cta {
            display:inline-flex; align-items:center; gap:6px;
            margin-top:14px; padding:8px 18px;
            border:1px solid rgba(255,255,255,0.2);
            border-radius:999px; background:rgba(255,255,255,0.08);
            color:var(--color-text); font-size:11px;
            letter-spacing:0.1em; text-transform:uppercase;
            text-decoration:none;
            transition:all 0.3s ease;
        }
        .card-cta:hover {
            background:rgba(255,255,255,0.15);
            border-color:var(--color-accent);
        }

        /* ---- INDICATOR DOTS ---- */
        .gallery-dots {
            position:absolute; bottom:80px; left:50%; transform:translateX(-50%);
            z-index:10; display:flex; gap:10px;
        }
        .gallery-dot {
            width:8px; height:8px; border-radius:50%;
            background:rgba(255,255,255,0.25); border:none;
            cursor:pointer; transition:all 0.3s ease;
            pointer-events:auto;
        }
        .gallery-dot.active {
            background:var(--color-accent);
            box-shadow:0 0 10px rgba(212,175,55,0.4);
            transform:scale(1.3);
        }

        /* ---- RESPONSIVE ---- */
        @media (max-width:768px) {
            .gallery-card { width:220px; height:310px; margin-left:-110px; margin-top:-155px; }
            .gallery-ring { width:220px; height:310px; }
            .card-title { font-size:22px; }
            .card-content { padding:18px; }
            .brand-top { top:20px; }
            .scroll-hint { bottom:20px; }
            .gallery-dots { bottom:50px; }
        }
    </style>
</head>
<body>

    <!-- Scrollable space for rotation control -->
    <div class="scroll-container">
        <div class="sticky-viewport">

            <!-- WebGL Background -->
            <canvas class="webgl-canvas" id="bgCanvas"></canvas>
            <div class="bg-overlay"></div>

            <!-- Branding -->
            <div class="brand-top">
                <div class="brand-name">Bruno Lenses</div>
                <div class="brand-tagline">Fotografia & Filmagem</div>
            </div>

            <!-- 3D Card Gallery -->
            <div class="gallery-scene">
                <div class="gallery-ring" id="galleryRing"></div>
            </div>

            <!-- Dots -->
            <div class="gallery-dots" id="galleryDots"></div>

            <!-- Scroll Hint -->
            <div class="scroll-hint" id="scrollHint">
                <div class="scroll-hint-text">Role para explorar</div>
                <div class="scroll-hint-arrow"></div>
            </div>

        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
    (function() {
        'use strict';

        // ============================================
        // GALLERY CARDS DATA
        // ============================================
        const cards = [
            {
                title: "Casamento",
                label: "Fotografia & Filme",
                desc: "Eternizando cada momento do seu grande dia com arte e emoção.",
                image: "https://images.unsplash.com/photo-1519741497674-611481863552?w=800&auto=format&fit=crop&q=80",
                link: "casamento/"
            },
            {
                title: "Canônicas",
                label: "Projeto & Método",
                desc: "Descubra a metodologia por trás das Canônicas de Deus.",
                image: "assets/cards/canonicas.jpg",
                link: "https://www.canonicasdedeus.com.br"
            },
            {
                title: "Mentoria",
                label: "Educação & Negócios",
                desc: "Anamnese focada em marca pessoal e dissonância cognitiva.",
                image: "assets/cards/mentoria.png",
                link: "anamnese/"
            },
            {
                title: "Creative-SE",
                label: "Edição & Presets",
                desc: "Presets de altíssima qualidade baseados em colorimetria de cinema.",
                image: "assets/cards/Criative-Se.jpg",
                link: "#"
            },
            {
                title: "Ensaios",
                label: "Fotografia",
                desc: "Sessões externas, dança, sensual e corporativo.",
                image: "assets/cards/ensaios/danca/dança.jpg",
                link: "ensaios/"
            },
            {
                title: "E-books",
                label: "Biblioteca",
                desc: "Acervo completo de conhecimento técnico e prático.",
                image: "https://images.unsplash.com/photo-1492691527719-9d1e07e534b4?w=800&auto=format&fit=crop&q=80",
                link: "#"
            }
        ];

        // ============================================
        // BACKGROUND PHOTOS (Bruno's photos)
        // ============================================
        const bgPhotos = [
            "assets/slides/slide2.png"
        ];

        // ============================================
        // 3D CIRCULAR GALLERY
        // ============================================
        const RADIUS = window.innerWidth < 768 ? 380 : 550;
        const ring = document.getElementById('galleryRing');
        const dotsContainer = document.getElementById('galleryDots');
        const anglePerCard = 360 / cards.length;
        let currentRotation = 0;
        let targetRotation = 0; // Utilizado para suavizar (lerp)
        let autoRotateSpeed = 0.015;
        let isScrolling = false;
        let scrollTimeout;

        // Build cards
        cards.forEach((card, i) => {
            const el = document.createElement('div');
            el.className = 'gallery-card';
            el.style.transform = `rotateY(${i * anglePerCard}deg) translateZ(${RADIUS}px)`;
            
            const mediaHTML = card.video 
                ? `<video class="card-image" src="${card.video}" autoplay loop muted playsinline poster="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7"></video>` // fallback invisível
                : `<img class="card-image" src="${card.image}" alt="${card.title}" loading="lazy">`;

            el.innerHTML = `
                ${mediaHTML}
                <div class="card-glass"></div>
                <div class="card-content">
                    <div class="card-label">${card.label}</div>
                    <div class="card-title">${card.title}</div>
                    <div class="card-desc">${card.desc}</div>
                    ${card.link !== '#' ? `<a href="${card.link}" class="card-cta">Explorar <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg></a>` : `<span class="card-cta" style="opacity:0.4">Em breve</span>`}
                </div>
            `;
            if (card.link !== '#') {
                el.addEventListener('click', () => window.location.href = card.link);
            }
            ring.appendChild(el);

            // Dot
            const dot = document.createElement('button');
            dot.className = 'gallery-dot' + (i === 0 ? ' active' : '');
            dot.addEventListener('click', () => {
                const tAngle = -(i * anglePerCard);
                let diff = (tAngle - targetRotation) % 360;
                if (diff > 180) diff -= 360;
                if (diff < -180) diff += 360;
                targetRotation += diff;
            });
            dotsContainer.appendChild(dot);
        });

        function updateGallery() {
            ring.style.transform = `rotateY(${currentRotation}deg)`;

            // Update card opacities + dots
            const totalRot = ((currentRotation % 360) + 360) % 360;
            cards.forEach((_, i) => {
                const cardAngle = i * anglePerCard;
                const relAngle = ((cardAngle + totalRot + 360) % 360);
                const normAngle = Math.abs(relAngle > 180 ? 360 - relAngle : relAngle);
                const opacity = Math.max(0.2, 1 - (normAngle / 160));
                ring.children[i].style.opacity = opacity;
                dotsContainer.children[i].classList.toggle('active', normAngle < anglePerCard / 2);
            });
        }

        // Scroll-driven rotation (updates targetRotation)
        window.addEventListener('scroll', () => {
            isScrolling = true;
            clearTimeout(scrollTimeout);

            const scrollable = document.documentElement.scrollHeight - window.innerHeight;
            const progress = scrollable > 0 ? window.scrollY / scrollable : 0;
            targetRotation = -(progress * 360 * 1.5); // 1.5 full rotations over scroll

            // Hide scroll hint after first scroll
            const hint = document.getElementById('scrollHint');
            if (hint && window.scrollY > 50) {
                hint.style.opacity = '0';
                hint.style.transition = 'opacity 0.5s';
            }

            scrollTimeout = setTimeout(() => { isScrolling = false; }, 200);
        }, { passive: true });

        // Auto-rotate and LERP loop
        let lastTime = 0;
        function renderLoop(time) {
            // Auto rotate idle state
            if (!isScrolling && document.scrollingElement.scrollTop < 10) {
                const delta = time - lastTime;
                if (delta < 100) { // guard against huge gaps
                    targetRotation -= autoRotateSpeed * delta * 0.06;
                }
            }
            
            // Linear Interpolation (LERP) for buttery smooth physics
            currentRotation += (targetRotation - currentRotation) * 0.08;
            
            // Limit DOM updates if change is extremely small
            if (Math.abs(targetRotation - currentRotation) > 0.01) {
                updateGallery();
            }

            lastTime = time;
            requestAnimationFrame(renderLoop);
        }
        requestAnimationFrame(renderLoop);
        
        // Initial state
        updateGallery();

        // ============================================
        // WEBGL BACKGROUND (3 photos, slow crossfade)
        // ============================================
        const canvas = document.getElementById('bgCanvas');
        const scene = new THREE.Scene();
        const camera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 1);
        const renderer = new THREE.WebGLRenderer({ canvas, antialias: false, alpha: false });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

        const bgVertexShader = `varying vec2 vUv; void main() { vUv = uv; gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0); }`;
        const bgFragmentShader = `
            uniform sampler2D uTex1, uTex2;
            uniform float uProgress;
            uniform vec2 uRes, uSize1, uSize2;
            varying vec2 vUv;

            vec2 cover(vec2 uv, vec2 texSize) {
                vec2 s = uRes / texSize;
                float sc = max(s.x, s.y);
                vec2 sz = texSize * sc;
                vec2 off = (uRes - sz) * 0.5;
                return (uv * uRes - off) / sz;
            }

            void main() {
                vec2 uv1 = cover(vUv, uSize1);
                vec2 uv2 = cover(vUv, uSize2);
                vec4 c1 = texture2D(uTex1, uv1);
                vec4 c2 = texture2D(uTex2, uv2);

                // Prevent the image from disappearing or clipping at the top
                // Custom alignment for desktop to prevent face cutting:
                if (uRes.x > 768.0) {
                    uv1.y += 0.2; // Shift up 20%
                    uv2.y += 0.2;
                }

                c1 = texture2D(uTex1, uv1);
                c2 = texture2D(uTex2, uv2);

                gl_FragColor = mix(c1, c2, smoothstep(0.0, 1.0, uProgress));
            }
        `;

        const bgMaterial = new THREE.ShaderMaterial({
            uniforms: {
                uTex1: { value: null }, uTex2: { value: null }, uProgress: { value: 0 },
                uRes: { value: new THREE.Vector2(window.innerWidth, window.innerHeight) },
                uSize1: { value: new THREE.Vector2(1, 1) }, uSize2: { value: new THREE.Vector2(1, 1) }
            },
            vertexShader: bgVertexShader, fragmentShader: bgFragmentShader
        });
        scene.add(new THREE.Mesh(new THREE.PlaneGeometry(2, 2), bgMaterial));

        let bgTextures = [];
        let bgIndex = 0;

        async function loadBgTextures() {
            const loader = new THREE.TextureLoader();
            for (const src of bgPhotos) {
                try {
                    const tex = await new Promise((res, rej) => loader.load(src, res, undefined, rej));
                    tex.minFilter = tex.magFilter = THREE.LinearFilter;
                    tex.userData = { size: new THREE.Vector2(tex.image.width, tex.image.height) };
                    bgTextures.push(tex);
                } catch(e) { console.warn('BG texture failed:', src); }
            }
            if (bgTextures.length > 0) {
                bgMaterial.uniforms.uTex1.value = bgTextures[0];
                bgMaterial.uniforms.uTex2.value = bgTextures[Math.min(1, bgTextures.length - 1)];
                bgMaterial.uniforms.uSize1.value = bgTextures[0].userData.size;
                bgMaterial.uniforms.uSize2.value = bgTextures[Math.min(1, bgTextures.length - 1)].userData.size;
                document.querySelector('.sticky-viewport').style.opacity = '1';
            }
            // Auto cycle backgrounds
            if (bgTextures.length > 1) cycleBg();
        }

        function cycleBg() {
            setInterval(() => {
                const nextIdx = (bgIndex + 1) % bgTextures.length;
                bgMaterial.uniforms.uTex1.value = bgTextures[bgIndex];
                bgMaterial.uniforms.uTex2.value = bgTextures[nextIdx];
                bgMaterial.uniforms.uSize1.value = bgTextures[bgIndex].userData.size;
                bgMaterial.uniforms.uSize2.value = bgTextures[nextIdx].userData.size;
                gsap.fromTo(bgMaterial.uniforms.uProgress, { value: 0 }, { value: 1, duration: 3, ease: "power2.inOut", onComplete: () => { bgIndex = nextIdx; } });
            }, 8000);
        }

        function renderBg() { requestAnimationFrame(renderBg); renderer.render(scene, camera); }
        renderBg();
        loadBgTextures();

        window.addEventListener('resize', () => {
            renderer.setSize(window.innerWidth, window.innerHeight);
            bgMaterial.uniforms.uRes.value.set(window.innerWidth, window.innerHeight);
        });

    })();
    </script>

</body>
</html>
